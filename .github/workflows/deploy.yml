name: CI/CD Indiezone API

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar Testes Unitários
        run: mvn test

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/indiezone-api:latest

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Executar comandos na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/indiezone
            
            # Garante que a pasta de logs existe
            mkdir -p logs-producao
            
            # Baixa a nova imagem que acabou de passar nos testes
            docker compose pull api-indiezone
            
            # Reinicia apenas a API (sem derrubar o banco)
            docker compose up -d --no-deps api-indiezone
            
            # Limpa imagens antigas para não lotar o disco
            docker image prune -f
